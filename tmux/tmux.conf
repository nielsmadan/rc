set-option -ga update-environment ' ITERM_SESSION_ID KITTY_WINDOW_ID KITTY_LISTEN_ON KITTY_PID'

# truecolor passthrough (so nvim/harlequin render full color under tmux)
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc"

# bigger scrollback, restored after detach/reattach
set -g history-limit 50000
