# Layout
enabled_layouts splits

# Tab bar
tab_bar_edge top
tab_bar_style powerline
tab_bar_min_tabs 1
tab_powerline_style slanted
tab_bar_margin_width 0.0
tab_bar_margin_height 5.0 5.0
tab_title_template "{index}: {title}"
tab_bar_font_size 13.0

# Tab colors
active_tab_foreground   #000000
active_tab_background   #ffffff
active_tab_font_style   bold
inactive_tab_foreground #ffffff
inactive_tab_background #404040
inactive_tab_font_style normal
tab_bar_background     #202020

# Tab navigation
map cmd+1 goto_tab 1
map cmd+2 goto_tab 2
map cmd+3 goto_tab 3
map cmd+4 goto_tab 4
map cmd+5 goto_tab 5
map cmd+6 goto_tab 6
map cmd+7 goto_tab 7
map cmd+8 goto_tab 8
map cmd+9 goto_tab 9

# Splits and windows (iTerm2-like)
map cmd+d launch --location=vsplit --cwd=current
map cmd+shift+d launch --location=hsplit --cwd=current
map cmd+t new_tab
map cmd+w close_window
map cmd+n new_os_window

# Window navigation
map ctrl+h neighboring_window left
map ctrl+j neighboring_window down
map ctrl+k neighboring_window up
map ctrl+l neighboring_window right

# Window resizing
map cmd+shift+h resize_window narrower 2
map cmd+shift+l resize_window wider 2
map cmd+shift+k resize_window taller 2
map cmd+shift+j resize_window shorter 2

# Reload config
map cmd+shift+r load_config_file

# Remote control
allow_remote_control socket-only
listen_on unix:/tmp/kitty-{kitty_pid}

# Notifications
filter_notification app:"claude"

# Watcher
watcher ~/.config/kitty/juggler_watcher.py
